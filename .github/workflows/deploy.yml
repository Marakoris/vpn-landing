name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace placeholders
        run: |
          # Replace DOMAIN in all HTML files, sitemap, robots
          find . -name "*.html" -exec sed -i "s|DOMAIN|${{ vars.DOMAIN }}|g" {} +
          sed -i "s|DOMAIN|${{ vars.DOMAIN }}|g" sitemap.xml robots.txt
          # Replace API URL in all HTML files and JS
          find . -name "*.html" -exec sed -i "s|__API_URL__|${{ vars.API_URL }}|g" {} +
          sed -i "s|__API_URL__|${{ vars.API_URL }}|g" js/main.js
          # Replace GA ID in all HTML files
          find . -name "*.html" -exec sed -i "s|__GA_ID__|${{ vars.GA_ID }}|g" {} +

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
