name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace placeholders
        run: |
          # index.html: DOMAIN, __API_URL__, __GA_ID__
          sed -i "s|DOMAIN|${{ vars.DOMAIN }}|g" index.html sitemap.xml robots.txt
          sed -i "s|__API_URL__|${{ vars.API_URL }}|g" index.html js/main.js
          sed -i "s|__GA_ID__|${{ vars.GA_ID }}|g" index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
