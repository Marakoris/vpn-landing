<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1530" />
      <stop offset="100%" stop-color="#0d0d16" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Glow behind shield -->
  <ellipse cx="350" cy="290" rx="160" ry="160" fill="#00b8ff" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Shield icon -->
  <g filter="url(#glow)">
    <path d="M350 175 
             C370 170, 430 172, 455 178 
             L455 185 
             C455 280, 430 350, 350 395 
             C270 350, 245 280, 245 185 
             L245 178 
             C270 172, 330 170, 350 175 Z" 
          fill="url(#shieldGrad)" opacity="0.95"/>
  </g>

  <!-- Shield highlight border -->
  <path d="M350 175 
           C370 170, 430 172, 455 178 
           L455 185 
           C455 280, 430 350, 350 395 
           C270 350, 245 280, 245 185 
           L245 178 
           C270 172, 330 170, 350 175 Z" 
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Checkmark inside shield -->
  <polyline points="320,285 342,310 385,260" 
            fill="none" stroke="#0d0d16" stroke-width="10" 
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="560" y="240" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="64" font-weight="bold" fill="#ffffff">NoBorder VPN</text>

  <!-- Subtitle -->
  <text x="560" y="290" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="30" fill="#a0aabe">Быстрый VPN без границ</text>

  <!-- Badge background -->
  <rect x="560" y="325" width="280" height="48" rx="12" ry="12" 
        fill="rgba(0,217,255,0.1)" stroke="#00d9ff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Badge text -->
  <text x="700" y="356" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="24" font-weight="bold" fill="#00e6ff" text-anchor="middle">3 дня бесплатно</text>

  <!-- Bottom tagline -->
  <text x="560" y="435" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="20" fill="#646e82">Безопасность  •  Скорость  •  Приватность</text>

  <!-- Bottom decorative line -->
  <line x1="100" y1="580" x2="1100" y2="580" stroke="url(#shieldGrad)" stroke-width="1.5" opacity="0.15"/>
</svg>
